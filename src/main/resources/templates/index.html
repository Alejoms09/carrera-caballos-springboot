<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Carrera de Caballos Retro</title>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
</head>
<body>
<div class="bg-grid"></div>
<main class="container">
    <header class="hero panel">
        <p class="kicker">Spring Boot Edition</p>
        <h1>Carrera de Caballos con Cartas</h1>
        <p class="sub">Modo retro arcade con reglas clasicas y variante de retroceso.</p>
    </header>

    <section class="layout">
        <div class="stack">
            <form method="post" action="/new" class="panel controls">
                <h2>Nueva carrera</h2>
                <div class="control-grid">
                    <label>
                        Longitud de pista (3-12)
                        <input type="number" name="trackLength" min="3" max="12" value="7"/>
                    </label>
                    <label>
                        Retroceso (faltering)
                        <select name="falteringEnabled">
                            <option value="true" selected>Si</option>
                            <option value="false">No</option>
                        </select>
                    </label>
                </div>
                <button type="submit" class="btn btn-accent">Reiniciar</button>
            </form>

            <div class="panel">
                <h2>Estado</h2>
                <div class="stats">
                    <div class="chip">
                        <span class="chip-label">Ultima carta</span>
                        <span class="chip-value" th:text="${race.lastDrawn}">-</span>
                    </div>
                    <div class="chip">
                        <span class="chip-label">Mazo restante</span>
                        <span class="chip-value" th:text="${race.deck.size()}">0</span>
                    </div>
                    <div class="chip" th:if="${race.winner != null}">
                        <span class="chip-label">Ganador</span>
                        <span class="chip-value winner" th:text="${race.winner}"></span>
                    </div>
                </div>

                <div class="track">
                    <div class="horseRow" th:each="entry : ${race.horses}">
                        <div class="horseName" th:text="${entry.key}"></div>
                        <div class="lane">
                            <div class="cell"
                                 th:each="i : ${#numbers.sequence(1, race.config.trackLength)}"
                                 th:classappend="${entry.value.position >= i} ? 'filled' : ''">
                                <span th:text="${i}"></span>
                            </div>
                        </div>
                        <div class="posBadge" th:text="${entry.value.position}"></div>
                    </div>
                </div>

                <div class="actions">
                    <form method="post" action="/step">
                        <button type="submit" class="btn" th:disabled="${race.winner != null}">Paso (1 carta)</button>
                    </form>
                    <form method="post" action="/auto">
                        <button type="submit" class="btn btn-accent" th:disabled="${race.winner != null}">Auto (hasta ganar)</button>
                    </form>
                </div>
            </div>
        </div>

        <aside class="panel log-panel">
            <h2>Registro</h2>
            <ul class="log">
                <li th:each="line : ${log}" th:text="${line}"></li>
                <li th:if="${#lists.isEmpty(log)}" class="log-empty">Aun no hay jugadas. Presiona Paso para empezar.</li>
            </ul>
        </aside>
    </section>
</main>
</body>
</html>
