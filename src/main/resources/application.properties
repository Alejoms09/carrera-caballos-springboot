spring.application.name=juegodcaballos
server.port=${PORT:8080}
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:juegodcaballos}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USER:${MYSQLUSER:${MYSQL_USER:root}}}
spring.datasource.password=${DATABASE_PASSWORD:${MYSQLPASSWORD:${MYSQL_PASSWORD:}}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
app.max-groups=4
app.max-users-per-group=4
app.initial-points=1000
app.points-package-size=1000
app.points-package-price-cop=10000
